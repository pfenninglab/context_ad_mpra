# Data

train_data_paths:
  desc: Paths to FASTA, BED, or NarrowPeak files for training data.
  # fasta or bed format:
  #   fasta:
  #     - negatives.fa
  #     - positives.fa
  #   bed:
  #     - genome: genome.fa
  #       intervals: negatives.enhancer.bed
  #     - genome: genome.fa
  #       intervals: positives.enhancer.bed
  value:
    - genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa
      intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.train.enhancer.bed
    - genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa
      intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.train.Neg_Part1.enhancer.bed   
    - genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa
      intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.train.Neg_Part2.enhancer.bed      
    - genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa
      intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.train.Neg_Part3.enhancer.bed   
    - genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa
      intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.train.Neg_Part4.enhancer.bed   
train_targets:
  desc: Targets corresponding to each training data path.
  # To use a constant value per file, e.g. 0 or "neg", just put the value here.
  # To extract the value from each line of a BED or NarrowPeak file, put:
  #     column: <column number>
  value:
    - column: 6
    - column: 6
    - column: 6
    - column: 6
    - column: 6
        
val_data_paths:
  desc: Paths to FASTA, BED, or NarrowPeak files for validation data.
  value:
    - genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa
