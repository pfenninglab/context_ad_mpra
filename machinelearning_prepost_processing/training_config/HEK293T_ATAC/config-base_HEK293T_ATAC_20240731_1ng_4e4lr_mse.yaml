val_targets:
  desc: Targets corresponding to each validation data path.
  value:
    - column: 6

targets_are_classes:
  desc: Whether to treat targets as a set of discrete classes (classification) or as continuous values (regression).
  value: false

additional_val_data_paths:
  desc: Paths to additional validation datasets. Metrics will be reported for each set separately.
  # fasta or bed format:
  #   fasta:
  #     - [set1_negatives.fa, set1_positives.fa]
  #     - [set2_negatives.fa, set2_positives.fa]
  #   bed:
  #     - [{genome: genome.fa, intervals: set1_negatives.enhancer.bed},
  #        {genome: genome.fa, intervals: set1_positives.enhancer.bed}
  #     - [{genome: genome.fa, intervals: set2_negatives.enhancer.bed},
  #        {genome: genome.fa, intervals: set2_positives.enhancer.bed}
  #
  # it is fine to include a dataset with only negative or only positive examples, e.g.
  # - [set1_negatives.fa]

  value:
#    - [/projects/pfenninggroup/mouseCxStr/NeuronSubtypeATAC/Zoonomia_CNN/evaluations/SST/Eval1_mm10_VAL.fa]
    - [{genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa, intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.validation.enhancer.bed}]
    - [{genome: /ocean/projects/bio210062p/zihengc/genome/hg38/hg38.fa, intervals: /ocean/projects/bio210062p/zihengc/ad_ml/expand_peaks_500bp_hg38_enhancer_5kbfromTSS/HEK293T_ATAC.idr.optimal_peak.narrowPeak.validation.Neg.enhancer.bed}]

